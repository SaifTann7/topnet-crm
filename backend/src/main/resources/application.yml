spring:
  application:
    name: topnet-crm
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: ${BACKEND_PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: framework
  tomcat:
    remoteip:
      remote-ip-header: X-Forwarded-For
      protocol-header: X-Forwarded-Proto

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true
    info:
      access: unrestricted
    metrics:
      access: unrestricted
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true
  health:
    db:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true

info:
  app:
    name: TOPNET CRM
    description: Enterprise CRM Application
    version: 1.0.0-SNAPSHOT

topnet:
  apm:
    base-url: ${TOPNET_APM_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:topnet-crm-dev-secret-key-change-in-production-min-256-bits!!}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: INFO
    com.topnet.crm: INFO
    org.springframework.security: INFO
