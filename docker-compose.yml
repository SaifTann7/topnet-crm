# =============================================================================
# TOPNET CRM — Production Docker Compose
# Start:  docker compose up -d
# Stop:   docker compose down
# Logs:   docker compose logs -f
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 17
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: topnet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-topnet_crm}
      POSTGRES_USER: ${POSTGRES_USER:-topnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topnet123}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-topnet} -d ${POSTGRES_DB:-topnet_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - topnet-network

  # ---------------------------------------------------------------------------
  # Spring Boot API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: topnet-crm-backend:latest
    container_name: topnet-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-topnet_crm}
      POSTGRES_USER: ${POSTGRES_USER:-topnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-topnet123}
      JWT_SECRET: ${JWT_SECRET:-topnet-crm-docker-secret-key-change-in-production-min-256-bits!!}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      BACKEND_PORT: 8080
      JAVA_OPTS: ${JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom}
      DOCKER_READY: "true"
      TOPNET_APM_BASE_URL: ${TOPNET_APM_BASE_URL:-http://localhost:8080}
      TOPNET_APM_APPLICATION_NAME: ${TOPNET_APM_APPLICATION_NAME:-TOPNET CRM}
      TOPNET_APM_VERSION: ${TOPNET_APM_VERSION:-1.0.0-SNAPSHOT}
    labels:
      apm.topnet.discovery: "true"
      apm.topnet.application.name: "TOPNET CRM"
      apm.topnet.health.url: "http://backend:8080/actuator/health"
      apm.topnet.info.url: "http://backend:8080/actuator/info"
      apm.topnet.metrics.url: "http://backend:8080/actuator/metrics"
      apm.topnet.application.info.url: "http://backend:8080/application/info"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - topnet-network

  # ---------------------------------------------------------------------------
  # Angular SPA (Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: topnet-crm-frontend:latest
    container_name: topnet-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - topnet-network

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (main entry point)
  # ---------------------------------------------------------------------------
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    image: topnet-crm-nginx:latest
    container_name: topnet-nginx
    restart: unless-stopped
    environment:
      NGINX_SSL_ENABLED: ${NGINX_SSL_ENABLED:-false}
      NGINX_HOST: ${NGINX_HOST:-localhost}
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - nginx_logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - topnet-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  nginx_logs:
    driver: local
  nginx_cache:
    driver: local
  certbot_webroot:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  topnet-network:
    driver: bridge
